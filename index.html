<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkillsFuture</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0e27; color: #fff; }
    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
    header { padding: 20px 0; border-bottom: 1px solid #333; margin-bottom: 30px; }
    h1 { font-size: 28px; margin-bottom: 20px; }
    .btn { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; }
    .btn-primary { background: #00d4ff; color: #000; }
    .btn-secondary { background: #333; color: #fff; }
    .form { background: #1a1f3a; padding: 30px; border-radius: 8px; max-width: 400px; }
    .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; font-size: 14px; }
    input { width: 100%; padding: 10px; background: #0a0e27; border: 1px solid #333; color: #fff; border-radius: 4px; }
    .error { color: #ff6b6b; font-size: 14px; margin-top: 5px; }
    .marketplace { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-top: 30px; }
    .course-card { background: #1a1f3a; padding: 20px; border-radius: 8px; }
    .course-card h3 { margin-bottom: 10px; }
    .course-card p { font-size: 14px; color: #aaa; margin-bottom: 10px; }
    .course-price { font-size: 18px; font-weight: bold; color: #00d4ff; margin-bottom: 10px; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>SkillsFuture Marketplace</h1>
    </header>

    <div id="app"></div>
  </div>

  <script>
    const API_URL = 'https://skillsfuture-backend.onrender.com';
    let userToken = localStorage.getItem('token');
    let userData = localStorage.getItem('userData') ? JSON.parse(localStorage.getItem('userData')) : null;

    // Render app
    function render() {
      const app = document.getElementById('app');
      
      if (!userToken) {
        app.innerHTML = `
          <div class="form">
            <h2>Login</h2>
            <div class="form-group">
              <label>Email</label>
              <input type="email" id="email" placeholder="student@demo.com">
            </div>
            <div class="form-group">
              <label>Password</label>
              <input type="password" id="password" placeholder="password123">
            </div>
            <button class="btn btn-primary" onclick="login()">Login</button>
            <div id="error" class="error"></div>
          </div>
        `;
      } else {
        app.innerHTML = `
          <div>
            <p>Welcome, ${userData.fullName}!</p>
            <p>Credits: ${userData.credits}</p>
            <button class="btn btn-secondary" onclick="logout()">Logout</button>
          </div>
          <h2 style="margin-top: 30px;">Available Courses</h2>
          <div id="courses" class="marketplace"></div>
        `;
        loadCourses();
      }
    }

    async function login() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      try {
        const res = await fetch(`${API_URL}/api/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        
        const data = await res.json();
        
        if (!res.ok) {
          document.getElementById('error').textContent = data.error || 'Login failed';
          return;
        }
        
        localStorage.setItem('token', data.token);
        localStorage.setItem('userData', JSON.stringify(data.user));
        userToken = data.token;
        userData = data.user;
        render();
      } catch (err) {
        document.getElementById('error').textContent = 'Error: ' + err.message;
      }
    }

    async function loadCourses() {
      try {
        const res = await fetch(`${API_URL}/api/courses`);
        const courses = await res.json();
        
        const html = courses.map(c => `
          <div class="course-card">
            <h3>${c.title}</h3>
            <p>${c.description}</p>
            <div class="course-price">$${c.price}</div>
            <button class="btn btn-primary">Enroll</button>
          </div>
        `).join('');
        
        document.getElementById('courses').innerHTML = html;
      } catch (err) {
        console.error('Error loading courses:', err);
      }
    }

    function logout() {
      localStorage.removeItem('token');
      localStorage.removeItem('userData');
      userToken = null;
      userData = null;
      render();
    }

    // Initial render
    render();
  </script>
</body>
</html>
